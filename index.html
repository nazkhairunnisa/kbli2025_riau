<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBLI Usaha Riau</title>

    <link rel="icon" href="images/logo.png">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<body>

    <div class="top-nav">
        <a href="about.html" class="nav-button">

        </a>
    </div>

    <div class="container">

        <header class="hero-header">

            <div class="hero-left">
                <img src="images/logo dashboard.png" alt="USAHA RIAU KBLI2025" class="hero-logo">
            </div>

            <div class="hero-right">

                <h1>
                    <span class="usaha">USAHA</span>
                    <span class="riau">RIAU</span>
                    <span class="strip">–</span>

                <p class="hero-subtitle">
                    Temukan KBLI yang Tepat untuk Setiap Usaha
                </p>

            </div>

        </header>

        <!-- Konten utama -->
        <div class="search-box">
            <input type="text" id="search" placeholder="Cari nama usaha, aktivitas usaha, atau kode KBLI">
            <button id="btnCari">Cari</button>
        </div>

        <div id="result-count"></div>

        <div id="results"></div>

    <script src="app.js"></script>

    <footer>

        &copy; 2026 Tim KBLI BPS Provinsi Riau
